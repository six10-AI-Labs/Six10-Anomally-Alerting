name: Six10 Anomaly Alerting Pipeline

on:
  schedule:
    - cron: '30 13 * * *'  # Runs daily at 1:30 PM UTC
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target Date (YYYY-MM-DD). Leave blank for latest.'
        required: false
        default: ''
  repository_dispatch:
    types: [rerun_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5   # <--- FIXED THIS LINE
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Credentials from Secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > anomaly_alerting/anomaly-alerting-b7f70323da39.json
          echo "$GMAIL_TOKEN_JSON" > anomaly_alerting/gmail_token.json
          echo "$DOT_ENV_CONTENT" > anomaly_alerting/.env

      - name: Run Anomaly Detection
        run: |
          TARGET_DATE="${{ github.event.client_payload.date || github.event.inputs.target_date }}"
          if [ -n "$TARGET_DATE" ]; then
            echo "Starting pipeline for target date: $TARGET_DATE"
            python anomaly_alerting/main.py --date "$TARGET_DATE"
          else
            echo "Starting pipeline for latest data"
            python anomaly_alerting/main.py
          fi
