name: Six10 Anomaly Alerting Pipeline

on:
  schedule:
    - cron: '30 13 * * *'  # Runs daily at 1:30 PM UTC
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target Date (YYYY-MM-DD). Leave blank for latest.'
        required: false
        default: ''
  repository_dispatch:
    types: [rerun_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- NEW: PERSIST ALERT HISTORY ---
      - name: Restore Alert History Cache
        uses: actions/cache@v4
        with:
          path: anomaly_alerting/data/outputs/alert_history.csv
          key: alert-history-${{ github.run_id }}
          restore-keys: |
            alert-history-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Credentials from Secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
          # Pass the Anthropic key directly to env so main.py can see it
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > anomaly-alerting-b7f70323da39.json
          echo "$GMAIL_TOKEN_JSON" > gmail_token.json
          echo "$DOT_ENV_CONTENT" > .env

      - name: Run Anomaly Detection
        env:
          # Ensure AI key is available for the script
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TARGET_DATE="${{ github.event.client_payload.date || github.event.inputs.target_date }}"
          if [ -n "$TARGET_DATE" ]; then
            echo "Starting pipeline for target date: $TARGET_DATE"
            python anomaly_alerting/main.py --date "$TARGET_DATE"
          else
            echo "Starting pipeline for latest data"
            python anomaly_alerting/main.py
          fi

      # --- NEW: SAVE OUTPUTS ---
      - name: Upload Alert Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-anomaly-reports
          path: anomaly_alerting/data/outputs/*.xlsx
          retention-days: 7
