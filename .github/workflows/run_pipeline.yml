name: Six10 Anomaly Alerting Pipeline

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EDT / 7:00 AM EST) daily
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD)'
        required: false
        default: ''
  repository_dispatch:
    types: [rerun_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Credentials from Secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > anomaly_alerting/service_account.json
          echo "$GMAIL_TOKEN_JSON" > anomaly_alerting/gmail_token.json
          echo "$DOT_ENV_CONTENT" > anomaly_alerting/.env

      - name: Run Pipeline
        run: |
          # Determine date from inputs or dispatch payload
          TARGET_DATE="${{ github.event.inputs.date || github.event.client_payload.date }}"
          
          # Use PYTHONPATH to ensure imports work correctly
          export PYTHONPATH=$PYTHONPATH:$(pwd)/anomaly_alerting
          
          if [ -n "$TARGET_DATE" ]; then
            python anomaly_alerting/main.py --date "$TARGET_DATE"
          else
            python anomaly_alerting/main.py
          fi

      - name: Upload Logs/Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            anomaly_alerting/data/outputs/
            anomaly_alerting/data/helium10_history/
