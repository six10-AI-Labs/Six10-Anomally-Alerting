name: Six10 Anomaly Alerting Pipeline

on:
  schedule:
    - cron: '30 13 * * *'  # Runs daily at 1:30 PM UTC
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target Date (YYYY-MM-DD). Leave blank for latest.'
        required: false
        default: ''
  repository_dispatch:
    types: [rerun_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Automated dependency caching

      # --- PERMANENT ALERT TRACKING ---
      - name: Setup Workspace
        run: mkdir -p anomaly_alerting/data/outputs

      - name: Restore Alert History Cache
        uses: actions/cache@v4
        with:
          path: anomaly_alerting/data/outputs/alert_history.csv
          key: alert-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            alert-history-${{ runner.os }}-
            alert-history-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # --- CREDENTIAL SETUP ---
      - name: Restore Credentials from Secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          DOT_ENV_CONTENT: ${{ secrets.DOT_ENV_CONTENT }}
        run: |
          # Write credentials to root where the scripts expect them
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > anomaly-alerting-b7f70323da39.json
          echo "$GMAIL_TOKEN_JSON" > gmail_token.json
          echo "$DOT_ENV_CONTENT" > .env

      # --- EXECUTION ---
      - name: Run Anomaly Detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Logic to handle both Manual Runs (inputs) and Email Reruns (client_payload)
          RAW_INPUT="${{ github.event.inputs.target_date }}"
          PAYLOAD_DATE="${{ github.event.client_payload.date }}"
          
          # Use manual input if provided, otherwise fallback to email trigger date
          TARGET_DATE=${RAW_INPUT:-$PAYLOAD_DATE}

          if [ -n "$TARGET_DATE" ]; then
            echo "Starting pipeline for target date: $TARGET_DATE"
            python anomaly_alerting/main.py --date "$TARGET_DATE"
          else
            echo "Starting pipeline for latest data (standard daily run)"
            python anomaly_alerting/main.py
          fi

      # --- SAVING OUTPUTS ---
      - name: Upload Alert Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-anomaly-reports
          path: anomaly_alerting/data/outputs/*.xlsx
          retention-days: 7
